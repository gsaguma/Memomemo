<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memo Memo — Translation Memory Toolkit</title>

    <!-- Open Graph (LinkedIn, Facebook, WhatsApp) -->
    <meta property="og:title" content="Memo Memo — Translation Memory Toolkit" />
    <meta property="og:description" content="100% client-side translation memory toolkit. TMX, XLIFF and CSV. Your files never leave your browser." />
    <meta property="og:image" content="https://memotmx.vercel.app/media/og-image.png" />
    <meta property="og:url" content="https://memotmx.vercel.app" />
    <meta property="og:type" content="website" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Memo Memo — Translation Memory Toolkit" />
    <meta name="twitter:description" content="100% client-side translation memory toolkit. TMX, XLIFF and CSV. Your files never leave your browser." />
    <meta name="twitter:image" content="https://memotmx.vercel.app/media/og-image.png" />
    <link class="icon" rel="icon" type="image/png" sizes="32x32" href="media/memotmx.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#3B82F6',
                        secondary: '#93C5FD',
                        darkBg: '#0F172A',
                        darkCard: '#1E293B',
                        accent: '#60A5FA'
                    }
                }
            }
        }
    </script>
    <style>
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #93C5FD;
            border-radius: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #3B82F6;
        }
    </style>
</head>
<body class="bg-[#F0F9FF] text-[#1F2937] min-h-screen flex flex-col font-sans transition-colors duration-200 pb-16 md:pb-0">
    <div id="mainContent">
        <div class="container mx-auto px-4 py-3 max-w-5xl">
            <h1 class="text-2xl font-bold text-center mb-3 text-primary dark:text-primary flex items-center justify-center gap-2">
                <img src="media/memotmx.png" alt="Memo TMX Logo" class="h-6 w-auto object-contain" />
                <span>Memo Memo</span>
            </h1>

            <!-- Session Banner -->
            <div id="sessionBanner" class="hidden flex items-center justify-between gap-3 rounded-lg px-4 py-2.5 text-sm mb-4"></div>

            <!-- Tab Navigation -->
            <div class="flex border-b border-gray-200 dark:border-gray-700 mb-6 md:static fixed bottom-0 left-0 right-0 z-50 bg-white dark:bg-[#1E293B] border-t md:border-t-0 p-2 md:p-0 md:mb-6 mb-0 shadow-lg md:shadow-none justify-around md:justify-start">
                <button id="tabSearchBtn" aria-label="Search and View Translation Memory" class="flex-1 md:flex-initial py-1 md:py-2 px-2 md:px-4 text-[10px] md:text-sm font-medium border-t-2 border-b-0 md:border-t-0 md:border-b-2 border-primary text-primary focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-1 dark:focus:ring-offset-gray-900 rounded-t flex flex-col md:flex-row items-center justify-center gap-1 md:gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                    </svg>
                    Search & View
                </button>
                <button id="tabMetaBtn" aria-label="Edit Metadata" class="flex-1 md:flex-initial py-1 md:py-2 px-2 md:px-4 text-[10px] md:text-sm font-medium border-t-2 border-b-0 md:border-t-0 md:border-b-2 border-transparent text-gray-500 dark:text-gray-400 hover:text-gray-700 dark:hover:text-gray-300 hover:border-gray-300 dark:hover:border-gray-600 focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-1 dark:focus:ring-offset-gray-900 rounded-t flex flex-col md:flex-row items-center justify-center gap-1 md:gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" />
                    </svg>
                    Edit Metadata
                </button>
                <button id="tabAlignBtn" aria-label="Align Translations" class="flex-1 md:flex-initial py-1 md:py-2 px-2 md:px-4 text-[10px] md:text-sm font-medium border-t-2 border-b-0 md:border-t-0 md:border-b-2 border-transparent text-gray-500 dark:text-gray-400 hover:text-gray-700 dark:hover:text-gray-300 hover:border-gray-300 dark:hover:border-gray-600 focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-1 dark:focus:ring-offset-gray-900 rounded-t flex flex-col md:flex-row items-center justify-center gap-1 md:gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
                    </svg>
                    Align Translations
                </button>
                <button id="tabMergeBtn" aria-label="Merge Translation Memories" class="flex-1 md:flex-initial py-1 md:py-2 px-2 md:px-4 text-[10px] md:text-sm font-medium border-t-2 border-b-0 md:border-t-0 md:border-b-2 border-transparent text-gray-500 dark:text-gray-400 hover:text-gray-700 dark:hover:text-gray-300 hover:border-gray-300 dark:hover:border-gray-600 focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-1 dark:focus:ring-offset-gray-900 rounded-t flex flex-col md:flex-row items-center justify-center gap-1 md:gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4" />
                    </svg>
                    Merge TMs
                </button>
            </div>

            <!-- Tab Contents (Injected Dynamically via Components) -->
            <div id="tabSearchContent"></div>
            <div id="tabMetaContent" class="hidden"></div>
            <div id="tabAlignContent" class="hidden"></div>
            <div id="tabMergeContent" class="hidden"></div>
        </div>
    </div>

    <script type="module" src="js/main.js"></script>
</body>
<footer class="text-center py-4 text-sm text-primary dark:text-secondary">
    <a href="https://www.linkedin.com/in/gsaguma" target="_blank" 
       class="hover:text-accent dark:hover:text-accent transition-colors">
       Created with ♥ by Gabriel Saguma
    </a>
</footer>
</html>
